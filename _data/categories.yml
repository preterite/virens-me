# ==========================================================================
# VIRENS.ME — Six-Category Taxonomy (Move-Based)
#
# Categories describe *what happened* in a post, not what technology
# was used. They map to the VIRENS workflow's six moves:
#   capture → classify → route → distill → connect → publish
#
# Each category uses a Lucide icon (ISC license) rendered at 12px
# in the post stream and listing pages.
#
# Locked: Session 15c (taxonomy), 15d (icon assignments)
# ==========================================================================

architecture:
  name: Architecture
  description: "Structural decisions — how the pieces fit and why"
  icon_name: cpu
  # Lucide "cpu" icon paths (viewBox 0 0 24 24)
  svg: '<path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/><path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/><path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/><path d="M7 20v2"/><path d="M7 2v2"/><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/>'

