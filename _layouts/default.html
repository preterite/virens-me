<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <!-- Font preloads — critical rendering path
       Preload body regular + heading bold to avoid FOUT on first paint -->
  <link rel="preload" href="{{ '/assets/fonts/LibreBaskerville-Regular.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/CooperHewitt-Bold.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/virens-base.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/virens-dark-theme.css' | relative_url }}">
  
  <!-- SEO -->
  {% seo %}
  
  <!-- Feed -->
  {% feed_meta %}
</head>

<body data-site="{{ site.site_type }}">
  <div class="page-wrapper">
    <a href="#main" class="skip-link">Skip to main content</a>
    
    {% include header.html %}
    {% include navigation.html %}
    
    {% if page.show_breadcrumbs != false %}
    <div class="breadcrumbs">
      <div class="breadcrumbs-content">
        {% include breadcrumbs.html %}
      </div>
    </div>
    {% endif %}

    <!-- Divider: header → content -->
    <div class="threshold-strip divider-header" data-src="random">
      <canvas></canvas>
    </div>

    <main id="main">
      <div class="main-content">
        {{ content }}
      </div>

      <aside>
        {% include sidebar.html %}
      </aside>
    </main>

    <!-- Divider: content → footer -->
    <div class="threshold-strip divider-footer" data-src="random">
      <canvas></canvas>
    </div>

    {% include footer.html %}
  </div>

  <!-- Scripts -->
  <script src="{{ '/assets/js/virens.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/threshold-split-multimode.js' | relative_url }}"></script>
</body>
</html>
